<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>
    <alias>
        <family>normal</family>
        <prefer>
            <family>Hack Nerd Font</family>
        </prefer>
    </alias>
    <alias>
        <family>monospace</family>
        <prefer>
            <family>Hack Nerd Font Mono</family>
        </prefer>
    </alias>
    <alias>
        <family>proportional</family>
        <prefer>
            <family>Hack Nerd Font Propo</family>
        </prefer>
    </alias>
</fontconfig>
